<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependency Graph Visualizer</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div id="app">
        <header class="header">
            <h1>📊 Dependency Graph Visualizer</h1>
            <div class="header-controls">
                <input type="file" id="file-input" accept=".json" style="display: none;">
                <button id="import-btn" class="btn">📁 Import Graph Data</button>
                <button id="export-btn" class="btn" disabled>💾 Export View</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="panel">
                    <h3>🔍 Filters</h3>
                    <div class="filter-group">
                        <label for="search-input">Search files:</label>
                        <input type="text" id="search-input" placeholder="Enter filename or path...">
                    </div>

                    <div class="filter-group">
                        <label for="node-type-filter">Node types:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="type-entry" checked> Entry files</label>
                            <label><input type="checkbox" id="type-internal" checked> Internal files</label>
                            <label><input type="checkbox" id="type-external" checked> External deps</label>
                            <label><input type="checkbox" id="type-barrel" checked> Barrel files</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label for="depth-filter">Max depth:</label>
                        <input type="range" id="depth-filter" min="1" max="10" value="10">
                        <span id="depth-value">10</span>
                    </div>

                    <div class="filter-group">
                        <button id="reset-filters" class="btn btn-secondary">🔄 Reset Filters</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>📈 Statistics</h3>
                    <div id="stats">
                        <div class="stat-item">
                            <span class="stat-label">Total files:</span>
                            <span id="total-files">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Visible files:</span>
                            <span id="visible-files">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">External deps:</span>
                            <span id="external-deps">-</span>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>🎛️ Layout</h3>
                    <div class="filter-group">
                        <label for="layout-select">Layout type:</label>
                        <select id="layout-select">
                            <option value="force">Force-directed</option>
                            <option value="hierarchy">Hierarchical</option>
                            <option value="circular">Circular</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <button id="center-graph" class="btn btn-secondary">🎯 Center Graph</button>
                    </div>
                </div>
            </div>

            <!-- Main visualization area -->
            <div class="visualization-area">
                <div id="loading" class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading dependency graph...</p>
                </div>

                <div id="error" class="error" style="display: none;">
                    <h3>❌ Error loading graph data</h3>
                    <p id="error-message"></p>
                    <button id="retry-btn" class="btn">🔄 Retry</button>
                </div>

                <svg id="graph-svg">
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
                        </marker>
                    </defs>
                </svg>

                <div id="tooltip" class="tooltip"></div>
            </div>
        </div>

        <!-- Node details panel -->
        <div id="node-details" class="node-details" style="display: none;">
            <div class="panel">
                <div class="panel-header">
                    <h3 id="node-title">File Details</h3>
                    <button id="close-details" class="close-btn">✕</button>
                </div>
                <div class="panel-content">
                    <div class="detail-section">
                        <h4>📄 File Info</h4>
                        <div id="file-info"></div>
                    </div>
                    <div class="detail-section">
                        <h4>📥 Imports</h4>
                        <div id="imports-list"></div>
                    </div>
                    <div class="detail-section">
                        <h4>📤 Exports</h4>
                        <div id="exports-list"></div>
                    </div>
                    <div class="detail-section" id="unused-exports-section" style="display: none;">
                        <h4>⚠️ Unused Exports</h4>
                        <div id="unused-exports-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
